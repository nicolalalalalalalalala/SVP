<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>China Debt Dynamics | ShoreVest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/shared-header.css" />
  <link rel="stylesheet" href="assets/css/shorevest-typography-system.css" />
  <link rel="stylesheet" href="assets/css/cdd-article-template.css" />
  <script src="assets/js/shared-header.js" defer></script>
</head>
<body>
  <div id="site-header-mount"></div>

  <div class="cdd-topline">
    <div class="wrap cdd-topline__inner">
      <div class="cdd-label">ShoreVest Insights Publication</div>
      <div class="cdd-lockup" lang="zh-Hant">新岸資本 · 中國債務動態</div>
    </div>
  </div>

  <main class="cdd-page wrap">
    <div class="cdd-intro">
      <div class="cdd-intro__bar">
        <div id="meta" class="cdd-meta"></div>
        <div class="cdd-actions">
          <a class="cdd-btn" href="insights.html">Back to Insights</a>
        </div>
      </div>
      <div class="cdd-intro__grid">
        <div class="cdd-intro__lede">
          <h1 id="title" class="cdd-title"></h1>
          <p id="dek" class="cdd-dek"></p>
        </div>
      </div>
    </div>

    <div class="cdd-reading-grid">
      <article id="content" class="cdd-body"></article>
      <aside id="findings-card" class="cdd-sidecard" hidden>
        <h3>Key Findings</h3>
        <ul id="findings"></ul>
      </aside>
    </div>

    <footer class="cdd-disclaimer">
      <h4>Legal Information and Disclosures</h4>
      <p id="disclaimer"></p>
      <p><strong>Our contact details:</strong> <span id="contact"></span></p>
      <p id="copyright"></p>
    </footer>
  </main>

  <script>
    const contentEl = document.getElementById('content');
    const metaEl = document.getElementById('meta');
    const titleEl = document.getElementById('title');
    const dekEl = document.getElementById('dek');
    const disclaimerEl = document.getElementById('disclaimer');
    const contactEl = document.getElementById('contact');
    const copyrightEl = document.getElementById('copyright');

    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    if (!file) {
      contentEl.innerHTML = '<p class="err">No article file was provided.</p>';
      throw new Error('Missing file');
    }

    const safePrefix = 'assets/china-debt-dynamics/';
    if (!file.startsWith(safePrefix)) {
      contentEl.innerHTML = '<p class="err">Invalid article path.</p>';
      throw new Error('Invalid file path');
    }

    const isBodyHeading = (value) => {
      const normalized = value.toLowerCase();
      return normalized !== 'legal information and disclosures' && normalized !== 'contact';
    };

    fetch(file)
      .then((res) => {
        if (!res.ok) throw new Error('Unable to load article.');
        return res.text();
      })
      .then((md) => {
        const lines = md.split(/\r?\n/);
        const article = {
          series: 'China Debt Dynamics',
          volumeIssue: '',
          published: '',
          edition: 'Allocator Edition',
          title: '',
          dek: '',
          keyFindings: [],
          sections: [],
          disclaimer: '',
          contact: '',
          copyright: 'All rights reserved.'
        };

        let mode = 'body';
        let currentSection = null;
        const disclaimerParts = [];
        const contactParts = [];

        const ensureSection = () => {
          if (!currentSection) {
            currentSection = { heading: null, paragraphs: [] };
            article.sections.push(currentSection);
          }
          return currentSection;
        };

        lines.forEach((raw) => {
          const line = raw.trim();
          if (!line) return;

          if (line.startsWith('# ')) {
            article.series = line.slice(2).trim() || article.series;
            return;
          }

          const volumeMatch = line.match(/^\*\*Volume \/ Issue:\*\*\s*(.+)$/i);
          if (volumeMatch) {
            article.volumeIssue = volumeMatch[1].trim();
            return;
          }

          const dateMatch = line.match(/^\*\*Date:\*\*\s*(.+)$/i);
          if (dateMatch) {
            article.published = dateMatch[1].trim();
            return;
          }

          if (line.startsWith('## ')) {
            const heading = line.slice(3).replace(/\*\*/g, '').trim();
            if (!article.title && isBodyHeading(heading)) {
              article.title = heading;
              mode = 'body';
              return;
            }

            if (heading.toLowerCase() === 'legal information and disclosures') {
              mode = 'legal';
              currentSection = null;
              return;
            }

            if (heading.toLowerCase() === 'contact') {
              mode = 'contact';
              currentSection = null;
              return;
            }

            if (heading.toLowerCase() === 'key findings') {
              mode = 'findings';
              currentSection = null;
              return;
            }

            mode = 'body';
            currentSection = { heading, paragraphs: [] };
            article.sections.push(currentSection);
            return;
          }

          if (line.startsWith('### ') && mode === 'body') {
            currentSection = { heading: line.slice(4).replace(/\*\*/g, '').trim(), paragraphs: [] };
            article.sections.push(currentSection);
            return;
          }

          if (line.startsWith('Copyright')) {
            article.copyright = line.replace(/\s+/g, ' ').trim();
            return;
          }
          if (line.toLowerCase() === 'all rights reserved.') {
            if (!article.copyright.toLowerCase().includes('all rights reserved')) {
              article.copyright = `${article.copyright} ${line}`.trim();
            }
            return;
          }

          if (mode === 'legal') {
            disclaimerParts.push(line.replace(/\*\*/g, '').trim());
            return;
          }

          if (mode === 'contact') {
            contactParts.push(line.replace(/\*\*/g, '').trim());
            return;
          }

          if (mode === 'findings') {
            if (line.startsWith('- ')) {
              article.keyFindings.push(line.slice(2).replace(/\*\*/g, '').trim());
              return;
            }
            mode = 'body';
          }

          ensureSection().paragraphs.push(line.replace(/\*\*/g, '').trim());
        });

        if (!article.dek && article.sections.length && article.sections[0].paragraphs.length) {
          article.dek = article.sections[0].paragraphs.shift();
        }

        article.disclaimer = disclaimerParts.join(' ');
        article.contact = contactParts.join(' · ');

        metaEl.innerHTML = `<span>${article.series}</span><span>${article.volumeIssue || 'Special Edition'}</span><span>Published ${article.published || 'Undated'}</span><span>${article.edition}</span>`;
        titleEl.textContent = article.title || 'China Debt Dynamics';
        dekEl.textContent = article.dek || '';

        document.title = `${titleEl.textContent} | ShoreVest`;

        article.sections.forEach((section) => {
          if (!section.paragraphs?.length && !section.heading) return;
          if (section.heading) {
            const h2 = document.createElement('h2');
            h2.textContent = section.heading;
            contentEl.appendChild(h2);
          }
          (section.paragraphs || []).forEach((paragraph) => {
            const p = document.createElement('p');
            p.textContent = paragraph;
            contentEl.appendChild(p);
          });
        });

        const findingsCardEl = document.getElementById('findings-card');
        const findingsEl = document.getElementById('findings');
        findingsEl.innerHTML = '';
        if (article.keyFindings.length) {
          article.keyFindings.forEach((finding) => {
            const li = document.createElement('li');
            li.textContent = finding;
            findingsEl.appendChild(li);
          });
          findingsCardEl.hidden = false;
        }

        disclaimerEl.textContent = article.disclaimer || 'No legal disclosure provided in source.';
        contactEl.textContent = article.contact || 'Contact information unavailable.';
        copyrightEl.textContent = article.copyright;
      })
      .catch((err) => {
        titleEl.textContent = 'Unable to load article';
        dekEl.textContent = '';
        metaEl.innerHTML = '<span>China Debt Dynamics</span><span>Error</span>';
        contentEl.innerHTML = `<p>${err.message}</p>`;
        disclaimerEl.textContent = 'No legal disclosure provided in source.';
        contactEl.textContent = 'Contact information unavailable.';
        copyrightEl.textContent = '';
      });
  </script>
</body>
</html>
