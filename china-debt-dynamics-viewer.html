<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>China Debt Dynamics Viewer</title>
    <link rel="stylesheet" href="assets/css/article-typography-framework.css" />
    <link rel="stylesheet" href="assets/css/typography-consistent.css" />
    <link rel="stylesheet" href="assets/css/shared-header.css" />
    <script src="assets/js/shared-header.js" defer></script>
<link rel="stylesheet" href="assets/css/shared-footer.css">
</head>
<body class="article-page">
  <div id="site-header-mount"></div>
  <div class="wrap">
    <a class="back action-button" href="insights.html">← Back to Insights</a>
    <div class="card">
      <div class="cdd-logo-wrap" aria-hidden="true">
        <img class="cdd-logo" src="assets/images/edited-photo-3.svg" alt="" />
      </div>
      <div id="meta" class="meta issue-meta-line">China Debt Dynamics</div>
      <article id="content" class="article-body"></article>
    </div>
  </div>
  <script>
    const contentEl = document.getElementById('content');
    const metaEl = document.getElementById('meta');

    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    if (!file) {
      contentEl.innerHTML = '<p class="err">No article file was provided.</p>';
      throw new Error('Missing file');
    }

    const safePrefix = 'assets/china-debt-dynamics/';
    if (!file.startsWith(safePrefix)) {
      contentEl.innerHTML = '<p class="err">Invalid article path.</p>';
      throw new Error('Invalid file path');
    }

    const flushParagraph = (buf) => {
      if (!buf.length) return null;
      const p = document.createElement('p');
      p.textContent = buf.join(' ').replace(/\*\*/g, '').trim();
      buf.length = 0;
      return p;
    };

    const flushList = (items) => {
      if (!items.length) return null;
      const ul = document.createElement('ul');
      items.forEach((txt) => {
        const li = document.createElement('li');
        li.textContent = txt.replace(/^[-*]\s+/, '').replace(/\*\*/g, '').trim();
        ul.appendChild(li);
      });
      items.length = 0;
      return ul;
    };

    fetch(file)
      .then((res) => {
        if (!res.ok) throw new Error('Unable to load article.');
        return res.text();
      })
      .then((md) => {
        const lines = md.split(/\r?\n/);
        const pBuf = [];
        const listBuf = [];

        for (const raw of lines) {
          const line = raw.trim();

          if (!line) {
            const maybeP = flushParagraph(pBuf);
            if (maybeP) contentEl.appendChild(maybeP);
            const maybeList = flushList(listBuf);
            if (maybeList) contentEl.appendChild(maybeList);
            continue;
          }

          if (line.startsWith('# ')) {
            const maybeP = flushParagraph(pBuf);
            if (maybeP) contentEl.appendChild(maybeP);
            const maybeList = flushList(listBuf);
            if (maybeList) contentEl.appendChild(maybeList);
            const h1 = document.createElement('h1');
            h1.textContent = line.slice(2).trim();
            document.title = `${h1.textContent} | China Debt Dynamics`;
            contentEl.appendChild(h1);
            continue;
          }

          if (line.startsWith('## ')) {
            const maybeP = flushParagraph(pBuf);
            if (maybeP) contentEl.appendChild(maybeP);
            const maybeList = flushList(listBuf);
            if (maybeList) contentEl.appendChild(maybeList);
            const h2 = document.createElement('h2');
            h2.textContent = line.slice(3).replace(/\*\*/g, '').trim();
            contentEl.appendChild(h2);
            continue;
          }

          if (line.startsWith('### ')) {
            const maybeP = flushParagraph(pBuf);
            if (maybeP) contentEl.appendChild(maybeP);
            const maybeList = flushList(listBuf);
            if (maybeList) contentEl.appendChild(maybeList);
            const h3 = document.createElement('h3');
            h3.textContent = line.slice(4).replace(/\*\*/g, '').trim();
            contentEl.appendChild(h3);
            continue;
          }

          if (/^[-*]\s+/.test(line)) {
            const maybeP = flushParagraph(pBuf);
            if (maybeP) contentEl.appendChild(maybeP);
            listBuf.push(line);
            continue;
          }

          if (line.startsWith('**Series:**') || line.startsWith('**Volume / Issue:**') || line.startsWith('**Date:**')) {
            metaEl.textContent = `${metaEl.textContent} · ${line.replace(/\*\*/g, '').trim()}`;
            continue;
          }

          pBuf.push(line);
        }

        const maybeP = flushParagraph(pBuf);
        if (maybeP) contentEl.appendChild(maybeP);
        const maybeList = flushList(listBuf);
        if (maybeList) contentEl.appendChild(maybeList);
      })
      .catch((err) => {
        contentEl.innerHTML = `<p class="err">${err.message}</p>`;
      });
  </script>
<footer class="sv-footer" data-shared-footer></footer>
<script src="assets/js/shared-footer.js" defer></script>
</body>
</html>
