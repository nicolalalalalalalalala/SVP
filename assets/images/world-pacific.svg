<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="mapTitle mapDesc">
  <title id="mapTitle">ShoreVest Operational Geography</title>
  <desc id="mapDesc">Minimal Pacific map showing ShoreVest locations in Guangzhou, Shanghai, Hong Kong, and California.</desc>

  <defs>
    <style>
      .ocean {
        fill: #f5f2e9;
      }
      .land {
        fill: #d8d4c8;
        stroke: #8f978f;
        stroke-width: 1.2;
        stroke-linejoin: round;
      }
      .coast-detail {
        fill: none;
        stroke: #9ca39c;
        stroke-width: 0.8;
      }
      .marker {
        fill: #1f3f4c;
        stroke: #f5f2e9;
        stroke-width: 1.5;
      }
      .marker-gz { fill: #c93b2a; }
      .marker-sh { fill: #2f7f7f; }
      .marker-hk { fill: #2e4a18; }
      .marker-ca { fill: #355f67; }
      .label,
      .region {
        font-family: "DIN 2014", "DIN2014", "DIN Alternate", "Arial Narrow", Arial, sans-serif;
        fill: #18323d;
      }
      .label {
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 0.03em;
      }
      .region {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        opacity: 0.8;
      }
      .leader {
        stroke: #51605b;
        stroke-width: 1;
        fill: none;
      }
    </style>
  </defs>

  <rect class="ocean" x="0" y="0" width="1400" height="760"/>

  <!-- Western North America -->
  <path class="land" d="M112 98
    L178 85 L252 104 L304 138 L332 182 L352 235 L359 283 L356 332 L346 377 L334 414
    L316 446 L300 475 L291 506 L280 542 L265 575 L242 610 L214 644 L179 665 L142 667
    L118 646 L111 611 L114 574 L122 538 L130 503 L133 466 L128 431 L118 395 L108 362
    L96 320 L86 269 L86 213 L96 158 Z"/>
  <path class="coast-detail" d="M251 463 L274 489 L264 526 L248 560 L227 596"/>
  <path class="coast-detail" d="M182 532 L206 548 L216 578 L202 611"/>

  <!-- East Asia -->
  <path class="land" d="M914 88
    L975 80 L1044 91 L1114 118 L1180 161 L1233 222 L1267 280 L1283 338 L1279 383 L1262 425
    L1233 460 L1196 484 L1164 505 L1132 536 L1093 566 L1048 592 L998 612 L957 616 L923 598
    L902 566 L894 533 L888 493 L871 461 L844 437 L813 419 L790 398 L782 367 L795 338 L821 314
    L849 290 L870 256 L887 212 L901 166 Z"/>
  <path class="land" d="M1169 319 L1192 330 L1204 354 L1200 379 L1181 396 L1157 395 L1139 377 L1137 350 Z"/>
  <path class="land" d="M1115 430 L1131 441 L1137 460 L1127 477 L1109 483 L1092 477 L1083 460 L1088 444 Z"/>
  <path class="land" d="M1061 542 L1082 558 L1085 582 L1069 602 L1042 607 L1022 593 L1018 571 L1034 550 Z"/>
  <path class="coast-detail" d="M1006 193 L1047 219 L1082 258 L1103 294"/>
  <path class="coast-detail" d="M943 420 L979 445 L1009 481"/>

  <text class="region" x="78" y="70">WESTERN UNITED STATES</text>
  <text class="region" x="918" y="62">EAST ASIA</text>

  <!-- Markers and labels -->
  <circle class="marker marker-ca" cx="219" cy="566" r="6"/>
  <line class="leader" x1="226" y1="561" x2="318" y2="530"/>
  <text class="label" x="330" y="536">CALIFORNIA</text>

  <circle class="marker marker-sh" cx="1098" cy="279" r="6"/>
  <line class="leader" x1="1105" y1="276" x2="1201" y2="242"/>
  <text class="label" x="1212" y="248">SHANGHAI</text>

  <circle class="marker marker-gz" cx="1048" cy="445" r="6"/>
  <line class="leader" x1="1041" y1="444" x2="933" y2="408"/>
  <text class="label" x="784" y="414">GUANGZHOU</text>

  <circle class="marker marker-hk" cx="1063" cy="469" r="6"/>
  <line class="leader" x1="1069" y1="471" x2="1190" y2="519"/>
  <text class="label" x="1202" y="525">HONG KONG</text>
</svg>
