<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" role="img" aria-labelledby="mapTitle mapDesc">
  <title id="mapTitle">ShoreVest Operational Geography</title>
  <desc id="mapDesc">Diagrammatic Pacific map highlighting Guangzhou, Shanghai, Hong Kong, and California.</desc>
  <defs>
    <style>
      .water { fill: #f6f1e5; }
      .paper-band { fill: #f2ecd8; }
      .grid { stroke: #d8ceb0; stroke-width: 1; opacity: 0.55; }
      .coast { fill: #d9d0bd; stroke: #8f998f; stroke-width: 1.8; }
      .region-accent { fill: #c8d4ce; }
      .marker-ring { fill: #f6f1e5; stroke-width: 2.5; }
      .marker-core { stroke: #f6f1e5; stroke-width: 2; }
      .callout { stroke: #6f786f; stroke-width: 1.5; }
      .label {
        font-family: "DIN 2014", "DIN2014", "DIN Alternate", "Arial Narrow", Arial, sans-serif;
        font-size: 24px;
        font-weight: 500;
        letter-spacing: 0.04em;
        fill: #1f3f4c;
      }
      .label-secondary {
        font-family: "DIN 2014", "DIN2014", "DIN Alternate", "Arial Narrow", Arial, sans-serif;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.05em;
        fill: #2e4a18;
      }
      .small-cap {
        font-family: "DIN 2014", "DIN2014", "DIN Alternate", "Arial Narrow", Arial, sans-serif;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.12em;
        fill: #56655a;
      }
      .route { stroke: #8ea5a0; stroke-width: 1.2; stroke-dasharray: 5 7; fill: none; opacity: 0.55; }
    </style>
  </defs>

  <rect class="water" x="0" y="0" width="1600" height="920" />
  <rect class="paper-band" x="0" y="0" width="1600" height="120" />
  <rect class="paper-band" x="0" y="770" width="1600" height="150" />

  <g aria-hidden="true">
    <line class="grid" x1="120" y1="130" x2="120" y2="785" />
    <line class="grid" x1="360" y1="130" x2="360" y2="785" />
    <line class="grid" x1="600" y1="130" x2="600" y2="785" />
    <line class="grid" x1="840" y1="130" x2="840" y2="785" />
    <line class="grid" x1="1080" y1="130" x2="1080" y2="785" />
    <line class="grid" x1="1320" y1="130" x2="1320" y2="785" />
    <line class="grid" x1="80" y1="220" x2="1520" y2="220" />
    <line class="grid" x1="80" y1="360" x2="1520" y2="360" />
    <line class="grid" x1="80" y1="500" x2="1520" y2="500" />
    <line class="grid" x1="80" y1="640" x2="1520" y2="640" />
    <line class="grid" x1="80" y1="780" x2="1520" y2="780" />
  </g>

  <g aria-label="Western North America">
    <path class="coast" d="M120 178 L180 168 L235 190 L245 220 L280 250 L306 282 L325 324 L326 360 L304 388 L295 420 L282 457 L260 486 L238 529 L218 574 L201 614 L181 648 L155 679 L120 703 L105 672 L116 626 L123 584 L128 536 L135 492 L130 444 L118 398 L103 350 L95 304 L99 259 Z"/>
    <path class="region-accent" d="M146 558 L186 556 L220 570 L246 594 L220 637 L182 654 L152 625 Z"/>
    <text class="small-cap" x="94" y="150">WESTERN UNITED STATES</text>
  </g>

  <g aria-label="East Asia">
    <path class="coast" d="M1012 196 L1068 170 L1138 168 L1208 182 L1276 212 L1322 254 L1342 296 L1328 328 L1284 350 L1234 358 L1205 387 L1178 429 L1138 471 L1091 505 L1049 533 L1010 546 L973 536 L946 513 L928 477 L918 442 L895 418 L864 405 L834 384 L823 360 L840 331 L874 314 L905 282 L926 246 L959 222 Z"/>
    <path class="coast" d="M1366 350 L1394 364 L1404 390 L1398 416 L1378 430 L1352 425 L1336 404 L1338 376 Z"/>
    <path class="coast" d="M1218 492 L1240 510 L1244 536 L1228 557 L1200 560 L1182 540 L1187 512 Z"/>
    <path class="region-accent" d="M1033 340 L1090 314 L1158 307 L1228 320 L1268 352 L1248 386 L1189 408 L1134 430 L1090 426 L1042 403 L1010 370 Z"/>
    <text class="small-cap" x="1000" y="150">EAST ASIA</text>
  </g>

  <path class="route" d="M236 592 C 470 514, 760 470, 1030 374" />

  <g aria-label="Location markers">
    <line class="callout" x1="1048" y1="395" x2="915" y2="350" />
    <circle class="marker-ring" cx="1048" cy="395" r="14" stroke="#c93b2a"/>
    <circle class="marker-core" cx="1048" cy="395" r="7" fill="#c93b2a"/>
    <text class="label" x="690" y="352">GUANGZHOU</text>

    <line class="callout" x1="1127" y1="334" x2="1245" y2="278" />
    <circle class="marker-ring" cx="1127" cy="334" r="13" stroke="#2f7f7f"/>
    <circle class="marker-core" cx="1127" cy="334" r="6" fill="#2f7f7f"/>
    <text class="label" x="1258" y="284">SHANGHAI</text>

    <line class="callout" x1="1078" y1="432" x2="1230" y2="502" />
    <circle class="marker-ring" cx="1078" cy="432" r="13" stroke="#2e4a18"/>
    <circle class="marker-core" cx="1078" cy="432" r="6" fill="#2e4a18"/>
    <text class="label" x="1242" y="510">HONG KONG</text>

    <line class="callout" x1="188" y1="598" x2="354" y2="575" />
    <circle class="marker-ring" cx="188" cy="598" r="11" stroke="#1f3f4c"/>
    <circle class="marker-core" cx="188" cy="598" r="5" fill="#1f3f4c"/>
    <text class="label" x="366" y="581">CALIFORNIA</text>
  </g>

  <text class="small-cap" x="710" y="735">PACIFIC OPERATIONAL FOOTPRINT</text>
</svg>
