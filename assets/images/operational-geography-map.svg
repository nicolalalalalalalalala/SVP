<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Pacific operational geography map</title>
  <desc id="desc">Pacific basin map highlighting California, Shanghai, Guangzhou, and Hong Kong with generous internal padding.</desc>

  <defs>
    <style>
      .ocean { fill: #e7eeea; }
      .land { fill: #c2cec6; stroke: #8da194; stroke-width: 1.2; }
      .coast { fill: none; stroke: #7f9488; stroke-width: 1; stroke-opacity: 0.55; }
      .marker { fill: #2f4f40; }
      .marker-accent { fill: #c93b2a; }
      .marker-ring { fill: none; stroke: #f4f7f5; stroke-width: 1.5; }
      .label {
        font-family: "DIN 2014", "DIN2014", "DIN Alternate", "Arial Narrow", Arial, sans-serif;
        font-size: 21px;
        font-weight: 520;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        fill: #20392e;
      }
      .frame {
        fill: none;
        stroke: #85988d;
        stroke-opacity: 0.38;
        stroke-width: 1;
      }
    </style>
  </defs>

  <rect class="ocean" x="0" y="0" width="1200" height="700" />

  <!-- Western North America (Pacific-facing) -->
  <path class="land" d="M104 92
    L158 80 L224 92 L270 126 L296 174 L298 228 L314 276 L318 334 L306 388
    L286 432 L262 474 L238 510 L220 546 L206 590 L190 640 L176 684 L96 700 L80 700
    L80 104 Z" />
  <path class="land" d="M226 520 L244 546 L252 586 L246 628 L230 668 L212 700 L188 700 L198 662 L214 620 L220 580 L216 542 Z" />

  <!-- East China / South China coastline block -->
  <path class="land" d="M920 78
    L964 88 L1010 114 L1046 152 L1072 194 L1086 242 L1084 296 L1074 338 L1086 384
    L1104 440 L1116 496 L1110 548 L1088 594 L1052 632 L1008 658 L964 674 L924 676
    L886 662 L896 632 L916 598 L938 562 L958 520 L974 478 L984 430 L982 384 L970 336
    L950 294 L926 252 L902 210 L888 172 L890 126 Z" />

  <!-- Korean peninsula / Taiwan / Philippines hints for orientation -->
  <path class="land" d="M978 164 L998 186 L1004 216 L992 238 L972 214 L968 186 Z" />
  <path class="land" d="M1000 452 L1018 472 L1016 500 L996 516 L982 496 L986 470 Z" />
  <path class="land" d="M1044 520 L1062 540 L1066 568 L1048 586 L1030 568 L1030 540 Z" />

  <!-- Subtle coastline traces for refinement -->
  <path class="coast" d="M142 104 L176 94 L214 102 L248 128 L270 164 L274 206 L286 244 L292 286 L288 330 L278 372 L258 414 L232 456 L210 500" />
  <path class="coast" d="M920 116 L950 130 L980 160 L1004 198 L1018 238 L1022 286 L1014 334 L1020 382 L1034 432 L1040 484 L1032 534 L1012 572 L980 608 L938 634" />

  <!-- Markers -->
  <g>
    <!-- California (coastal, clearly west coast) -->
    <circle class="marker" cx="244" cy="286" r="5.2" />
    <circle class="marker-ring" cx="244" cy="286" r="7.6" />

    <!-- Shanghai: north of South China cluster -->
    <circle class="marker" cx="968" cy="330" r="5.2" />
    <circle class="marker-ring" cx="968" cy="330" r="7.6" />

    <!-- Guangzhou -->
    <circle class="marker-accent" cx="938" cy="460" r="5.2" />
    <circle class="marker-ring" cx="938" cy="460" r="7.6" />

    <!-- Hong Kong: close to Guangzhou, slightly east/south-east -->
    <circle class="marker" cx="954" cy="472" r="5.2" />
    <circle class="marker-ring" cx="954" cy="472" r="7.6" />
  </g>

  <!-- Labels (manual, non-overlapping, with safe margins) -->
  <text class="label" x="262" y="280">California</text>
  <text class="label" x="986" y="324">Shanghai</text>
  <text class="label" x="922" y="456" text-anchor="end">Guangzhou</text>
  <text class="label" x="972" y="492">Hong Kong</text>

  <rect class="frame" x="40" y="40" width="1120" height="620" rx="2" />
</svg>
