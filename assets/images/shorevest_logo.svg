<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="ShoreVest logo">
  <title>ShoreVest logo</title>
  <g fill="none" stroke="#bf1e33" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer ring with top opening -->
    <path d="M143 190a142 142 0 1 0 226 0" stroke-width="11"/>

    <!-- trunk -->
    <path d="M256 369V166" stroke-width="10"/>

    <!-- upper crown -->
    <path d="M256 193l-35-33" stroke-width="8"/>
    <path d="M256 193l4-46" stroke-width="8"/>
    <path d="M256 193l36-31" stroke-width="8"/>

    <!-- middle branches -->
    <path d="M256 220l-49-27" stroke-width="8"/>
    <path d="M256 220l48-25" stroke-width="8"/>
    <path d="M256 252l-82-19" stroke-width="8"/>
    <path d="M256 252l84-18" stroke-width="8"/>

    <!-- lower branches -->
    <path d="M256 287l-93-7" stroke-width="8"/>
    <path d="M256 287l94-6" stroke-width="8"/>

    <!-- roots -->
    <path d="M193 334h46" stroke-width="6"/>
    <path d="M273 334h46" stroke-width="6"/>
    <path d="M209 346h26" stroke-width="6"/>
    <path d="M277 346h26" stroke-width="6"/>
  </g>

  <path id="shorevest-arc" d="M197 151a88 88 0 0 1 118 0" fill="none"/>
  <text fill="#bf1e33" font-size="34" font-family="'Noto Serif SC','Songti SC','STSong',serif" letter-spacing="6">
    <textPath href="#shorevest-arc" startOffset="50%" text-anchor="middle">新岸资本</textPath>
  </text>
</svg>
