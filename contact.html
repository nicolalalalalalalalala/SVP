<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoreVest | Contact</title>
  <link rel="icon" href="assets/images/edited-photo-3.svg?v=6" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/refinement-pass.css" />
  <link rel="stylesheet" href="assets/css/homepage-shorevest-brand.css" />
  <link rel="stylesheet" href="assets/css/legal-page-layout.css" />
  <link rel="stylesheet" href="assets/css/shared-header.css" />
  <script src="assets/js/shared-header.js" defer></script>
  <link rel="stylesheet" href="assets/css/shorevest-typography-system.css" />
  <link rel="stylesheet" href="assets/css/shared-footer.css" />
</head>
<body class="legal-page homepage contact-page">
  <div id="site-header-mount"></div>

  <main class="legal-page__main">
    <article class="legal-page__content contact-page__content">
      <header class="contact-page__header">
        <h1>Contact</h1>
        <p>For general enquiries, please contact ShoreVest Partners using the details below.</p>
      </header>

      <div class="contact-page__layout">
        <section class="section contact-page__primary-contact">
          <h2>Email</h2>
          <p class="contact-page__email"><a href="mailto:partners@shorevest.com">partners@shorevest.com</a></p>
        </section>

        <section class="section contact-page__form-section">
          <h2>Send us your details</h2>
          <form class="contact-form" action="mailto:partners@shorevest.com" method="post" enctype="text/plain">
            <div class="contact-form__grid">
              <label>
                Full Name
                <input type="text" name="full_name" autocomplete="name" required />
              </label>
              <label>
                Email Address
                <input type="email" name="email" autocomplete="email" required />
              </label>
              <label>
                Company
                <input type="text" name="company" autocomplete="organization" />
              </label>
              <label>
                Phone Number
                <input type="tel" name="phone" autocomplete="tel" />
              </label>
            </div>
            <label>
              Message
              <textarea name="message" rows="5" required></textarea>
            </label>
            <button type="submit">Submit</button>
          </form>
        </section>
      </div>
    </article>
  </main>

  <footer class="sv-footer" data-shared-footer></footer>

  <script src="assets/js/shared-footer.js" defer></script>
</body>
</html>
